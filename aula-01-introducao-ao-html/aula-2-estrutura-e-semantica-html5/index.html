<!-- estrutura basica html    -->
<!doctype html>
<!-- diz ao navegador para utilizar a última versão do html. -->
<html lang="pt-br">
  <!-- o atributo acima indica o idioma do site -->

  <head>
    <!-- head e body são IRMÃOS -->
    <meta charset="UTF-8" />
    <!-- charset indica o conjunto de caracteres  -->
    <meta name="viewport" content="width-device-width, initial scale=1.0" />
    <!-- permite apresentar uma melhor visualização em dispositivos móveis -->
    <title>Meu website</title>
    <!-- título exibido no navegador -->
  </head>
  <body>
    <h1>Meu site</h1>
    <p>Bem vindo ao meu site!</p>
  </body>
</html>

<!-- Semântica é o recurso que usamos para dar significado ao conteúdo, não apenas para modificar a aparência.  -->
 <!-- Por exemplo, a tag b (bold) deixa um texto em negrito. No entanto, o correto é utilizar as tags Strong ou h2, que possuem significado semântico. 
 Para deixar em italico, por exemplo, mantendo a semântica, você utiliza a tag EM invès deapenas I.  -->

  <html lang="pt-br">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de site com html semântico</title>
  </head>
  <body>

     <!-- cabecario do site  -->
  <header>
    <h1>Portal de Notícias</h1>
  </header>

  <!-- menu de enavegação  -->
